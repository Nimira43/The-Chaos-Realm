<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./images/TheFavicon.png">
  <link rel="stylesheet" href="./css/main.css">
  <title>The Chaos Realm</title>
</head>
<body>
  <div id="game-container">
    <div id="left-panel">
      <div id="player-ui">
        <div id="ap-display">AP: 36</div>
        <button id="end-turn-btn">End Turn</button>
      </div>

      <div id="left-lower">Left Lower</div>
    </div>
    <div id="middle-panel">
      <canvas id="map"></canvas>
    </div>
    <div id="right-panel">
      <div id="title-area" class="logo-text">The Chaos Realm</div>
      <div id="right-middle">
        <div id="turn-counter">Turn 1 / 30</div>
      </div>
      <div id="right-lower">Right Lower</div>
    </div>
  </div>
  <script src="./js/main.js" type="module"></script>
</body>
</html>
